<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grubbins</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Grubbins</h1>

<p class="subtitle">
At your service ❤️
</p>

<p id="today"></p>
    
<p id="clock"></p>

<p id="message"></p>

<div class="dashboard">

    <div class="panel calendar">
        <h2>📅 Calendar</h2>
    </div>

    <div class="panel">
        <h2>✅ Today's Tasks</h2>
    </div>

    <div class="panel">
        <h2>🛒 Shopping List</h2>
    </div>
    
<div class="panel">

    <h2>🗑️ Bin Reminder</h2>

    <p id="bin"></p>

</div>
    
    <div class="panel">
        <h2>🍽️ Meal Planner</h2>
    </div>

    <div class="panel weather">
        <h2>🌤️ Weather</h2>
    </div>

</div>

<script src="script.js"></script>

</body>

</html>
