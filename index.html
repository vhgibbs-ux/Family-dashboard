<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grubbins</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #eef3f7;
    margin: 0;
    padding: 20px;
}

h1{
    text-align: center;
    font-size: 42px;
    margin-bottom: 5px;
    color: #2c3e50;
}

.subtitle{
    text-align: center;
    color: #7f8c8d;
    font-size: 18px;
    margin-bottom: 10px;
}

#today{
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 30px;
    color: #4b6584;
}

h2{
    margin-top: 0;
    color: #34495e;
    font-size: 24px;
}

.dashboard{
    display: grid;
    grid-template-columns: 2fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 25px;
}

.panel{
    background: white;
    border-radius: 18px;
    padding: 22px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
    min-height: 170px;
    transition: 0.3s;
}

.calendar{
    grid-row: span 2;
}

.weather{
    grid-column: span 2;
    text-align: center;
}

</style>

</head>

<body>

<h1>Grubbins</h1>

<p class="subtitle">
At your service ❤️
</p>

<p id="today"></p>

<div class="dashboard">

    <div class="panel calendar">
        <h2>📅 Calendar</h2>
    </div>

    <div class="panel">
        <h2>✅ Today's Tasks</h2>
    </div>

    <div class="panel">
        <h2>🛒 Shopping List</h2>
    </div>

    <div class="panel">
        <h2>🍽️ Meal Planner</h2>
    </div>

    <div class="panel weather">
        <h2>🌤️ Weather</h2>
    </div>

</div>

<script>

const today = new Date();

document.getElementById("today").innerHTML =
today.toLocaleDateString("en-GB", {
    weekday: "long",
    day: "numeric",
    month: "long"
});

</script>

</body>

</html>
